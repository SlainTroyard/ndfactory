training:
  strategy: "dpo"
  dpo:
    beta: 0.1
    reference_model: null
    loss_type: "sigmoid"
  max_seq_length: 2048
  max_prompt_length: 1024
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  num_epochs: 1
  save_steps: 200
  eval_steps: 200
  logging_steps: 10
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  gradient_checkpointing: true
