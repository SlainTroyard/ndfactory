training:
  strategy: "ppo"
  ppo:
    num_episodes: 100
    ppo_epochs: 4
    batch_size: 64
    mini_batch_size: 8
    kl_coef: 0.1
    clip_range: 0.2
    value_clip_range: 0.2
    gamma: 1.0
    lam: 0.95
    max_new_tokens: 256
    temperature: 0.7
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  max_seq_length: 2048
  logging_steps: 10
  gradient_checkpointing: true
