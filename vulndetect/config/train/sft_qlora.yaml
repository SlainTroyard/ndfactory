# vulndetect/config/train/sft_qlora.yaml
training:
  strategy: "sft"
  sft:
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
  max_seq_length: 2048
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_epochs: 3
  save_steps: 200
  eval_steps: 200
  logging_steps: 10
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  deepspeed_stage: 2
  gradient_checkpointing: true
