# vulndetect/config/experiments/exp002_distil_sft.yaml
experiment:
  name: "qwen3b-distil-sft-v1"
  description: "Qwen-3B QLoRA SFT on teacher-distilled code security audit data"

includes:
  model: "model/qwen3b.yaml"
  training: "train/sft_qlora.yaml"

data:
  dataset:
    name: "distil_code_analysis"
  preprocessing:
    max_seq_length: 4096
    val_split: 0.1
    shuffle: true
    seed: 42

evaluation:
  benchmarks:
    - vulnbench
    - seceval
    - mmlu_compsec
    - cybermetric
    - ctibench
    - code_vuln_analysis
  eval_on_checkpoint: true
  eval_every_n_steps: 200
